# fly.toml for the Synapse Vault public indexer.
#
# Deploy from this directory:
#   fly launch --copy-config --name synapse-indexer-testnet
#   fly secrets set SYNAPSE_PACKAGE_ID=0x5da36d892956a4659415e245126a3964dd5aa6cf19ec2fdf6332bf828a4c58ed
#   fly secrets set SYNAPSE_NETWORK=testnet
#   fly deploy

app = "synapse-indexer-testnet"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4000"
  HOST = "0.0.0.0"
  NODE_ENV = "production"
  SYNAPSE_POLL_MS = "2000"
  SYNAPSE_PAGE_SIZE = "50"

[[services]]
  protocol = "tcp"
  internal_port = 4000

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

  [[services.http_checks]]
    interval = "15s"
    grace_period = "10s"
    method = "get"
    path = "/graphql"
    protocol = "http"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
